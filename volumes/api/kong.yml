_format_version: "1.1"

consumers:
  - username: anon
    keyauth_credentials:
      - key: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1sb2NhbCIsInJvbGUiOiJhbm9uIiwiZXhwIjoyMDUxMjIyNDAwfQ.QKfUQSqYBQE1g4uPebYVLpnLvqYDHEZX6dMPnXpgkbM
  - username: service_role
    keyauth_credentials:
      - key: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1sb2NhbCIsInJvbGUiOiJzZXJ2aWNlX3JvbGUiLCJleHAiOjIwNTEyMjI0MDB9.j85B2AZsQaYz9AZQVL8ip2klfMS2zAxAgkqa42d8jWI

acls:
  - consumer: anon
    group: anon
  - consumer: service_role
    group: admin

services:
  - name: auth-v1-open
    url: http://auth:9999/
    routes:
      - name: auth-v1-open
        strip_path: true
        paths:
          - /auth/v1/callback
          - /auth/v1/verify
          - /auth/v1/authorize
    plugins:
      - name: cors

  - name: auth-v1-open-access
    url: http://auth:9999/
    routes:
      - name: auth-v1-open-access
        strip_path: true
        paths:
          - /auth/v1/token
          - /auth/v1/signup
          - /auth/v1/recover
          - /auth/v1/resend
          - /auth/v1/otp
          - /auth/v1/magiclink
    plugins:
      - name: cors

  - name: auth-v1
    url: http://auth:9999/
    routes:
      - name: auth-v1-all
        strip_path: true
        paths:
          - /auth/v1/
    plugins:
      - name: cors
      - name: key-auth
        config:
          hide_credentials: false
      - name: acl
        config:
          hide_groups_header: true
          allow:
            - admin
            - anon

  - name: rest-v1
    url: http://rest:3000/
    routes:
      - name: rest-v1-all
        strip_path: true
        paths:
          - /rest/v1/
    plugins:
      - name: cors
      - name: key-auth
        config:
          hide_credentials: true
      - name: acl
        config:
          hide_groups_header: true
          allow:
            - admin
            - anon

  - name: storage-v1
    url: http://storage:5000/
    routes:
      - name: storage-v1-all
        strip_path: true
        paths:
          - /storage/v1/
    plugins:
      - name: cors
      - name: key-auth
        config:
          hide_credentials: false
      - name: acl
        config:
          hide_groups_header: true
          allow:
            - admin
            - anon

  - name: meta-v1
    url: http://meta:8080/
    routes:
      - name: meta-v1-all
        strip_path: true
        paths:
          - /pg/
    plugins:
      - name: cors
      - name: key-auth
        config:
          hide_credentials: false
      - name: acl
        config:
          hide_groups_header: true
          allow:
            - admin

  - name: realtime-v1
    url: http://realtime:4000/socket/
    routes:
      - name: realtime-v1-all
        strip_path: true
        paths:
          - /realtime/v1/
    plugins:
      - name: cors
      - name: key-auth
        config:
          hide_credentials: false
      - name: acl
        config:
          hide_groups_header: true
          allow:
            - admin
            - anon

  # ── Microsserviços da aplicação ──────────────────────────────────────
  # Rotas específicas têm prioridade sobre a genérica (core)

  - name: monitoring-svc
    url: http://monitoring-service:8002
    routes:
      - name: monitoring-route
        paths:
          - /api/monitoring
        strip_path: false
        preserve_host: true
        plugins:
          - name: cors
            enabled: false

  - name: freshservice-svc
    url: http://freshservice-service:8003
    routes:
      - name: freshservice-route
        paths:
          - /api/freshservice
        strip_path: false
        preserve_host: true
        plugins:
          - name: cors
            enabled: false

  - name: moneypenny-svc
    url: http://moneypenny-service:8004
    routes:
      - name: moneypenny-route
        paths:
          - /api/moneypenny
        strip_path: false
        preserve_host: true
        plugins:
          - name: cors
            enabled: false

  - name: agents-svc
    url: http://agents-service:8005
    routes:
      - name: agents-route
        paths:
          - /api/agents
        strip_path: false
        preserve_host: true
        plugins:
          - name: cors
            enabled: false

  - name: expenses-svc
    url: http://expenses-service:8006
    routes:
      - name: expenses-route
        paths:
          - /api/expenses
        strip_path: false
        preserve_host: true
        plugins:
          - name: cors
            enabled: false

  # Core captura /api/auth, /api/users, /api/admin, /api/health, /api/ready
  - name: core-svc
    url: http://core-service:8001
    routes:
      - name: core-route
        paths:
          - /api/
        strip_path: false
        preserve_host: true
        plugins:
          - name: cors
            enabled: false

plugins:
  - name: cors
    config:
      origins:
        - "*"
      methods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
      headers:
        - Accept
        - Accept-Version
        - Content-Length
        - Content-MD5
        - Content-Type
        - Date
        - X-Auth-Token
        - Authorization
        - apikey
        - x-client-info
        - X-Trace-ID
      exposed_headers:
        - X-Auth-Token
        - X-Trace-ID
      credentials: true
      max_age: 3600

  - name: rate-limiting
    config:
      minute: 120
      policy: local
      fault_tolerant: true
      hide_client_headers: false
