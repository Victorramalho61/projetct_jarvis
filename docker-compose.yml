name: jarvis

x-logging: &logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:

  # ────────────────────────────────────────────────────────────────────
  # SUPABASE
  # ────────────────────────────────────────────────────────────────────

  db:
    image: supabase/postgres:15.1.1.78
    restart: unless-stopped
    logging: *logging
    mem_limit: 1500m   # shared_buffers=256MB + overhead → ~600 MB; limite atual é seguro
    memswap_limit: 2000m  # 500 MB extra de swap como válvula de segurança contra OOM
    cpus: "1.5"        # era 1.0 — queries de agregação fiscal beneficiam do CPU extra
    healthcheck:
      test: pg_isready -U postgres -h localhost
      interval: 30s
      timeout: 5s
      retries: 10
    # Parâmetros PostgreSQL passados no startup (evita necessidade de ALTER SYSTEM com superuser)
    # Tuning aplicado em 2026-05-25 para Jarvis com 10 GB RAM host / 468 MB banco
    # Hardening 2026-05-28: max_connections 100→200, work_mem ajustado
    command:
      - postgres
      - -c
      - listen_addresses=*            # OBRIGATÓRIO: aceita conexões TCP da rede Docker
      - -c
      - max_connections=200           # era 100 — suporta pico de carga simultânea
      - -c
      - shared_buffers=256MB          # era 128 MB — 25% da RAM alocada ao container
      - -c
      - effective_cache_size=4GB      # hint ao planner: SO+PG cache estimado (não aloca RAM)
      - -c
      - work_mem=6MB                  # era 10 MB — reduzido com max_conn=200 (200×6=1.2GB max)
      - -c
      - maintenance_work_mem=128MB    # era 64 MB — VACUUM, CREATE INDEX, sync mais rápidos
      - -c
      - wal_buffers=16MB              # era 4 MB — menos flushes de WAL por sync fiscal
      - -c
      - random_page_cost=1.5          # era 4.0 (HDD) — ajustado para SSD/NVMe
      - -c
      - effective_io_concurrency=200  # era 1 — I/O paralelo para SSD
      - -c
      - checkpoint_completion_target=0.9  # era 0.5 — checkpoints mais suaves
      - -c
      - default_statistics_target=200    # era 100 — planos mais precisos para fiscal_documents
      - -c
      - timezone=America/Sao_Paulo       # horário de Brasília — alinha NOW() com o servidor
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_HOST: /var/run/postgresql
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      JWT_SECRET: ${SUPABASE_JWT_SECRET}
      JWT_EXP: ${JWT_EXPIRY}
      TZ: America/Sao_Paulo
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      app_net:
        aliases:
          - postgres

  auth:
    image: supabase/gotrue:v2.143.0
    restart: unless-stopped
    logging: *logging
    mem_limit: 256m
    cpus: "0.5"
    depends_on:
      db:
        condition: service_healthy
    environment:
      GOTRUE_API_HOST: 0.0.0.0
      GOTRUE_API_PORT: 9999
      API_EXTERNAL_URL: ${API_EXTERNAL_URL}
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: postgres://supabase_auth_admin:${POSTGRES_PASSWORD}@db:5432/postgres
      GOTRUE_SITE_URL: ${SITE_URL}
      GOTRUE_URI_ALLOW_LIST: "*"
      GOTRUE_DISABLE_SIGNUP: "false"
      GOTRUE_JWT_ADMIN_ROLES: service_role
      GOTRUE_JWT_AUD: authenticated
      GOTRUE_JWT_DEFAULT_GROUP_NAME: authenticated
      GOTRUE_JWT_EXP: ${JWT_EXPIRY}
      GOTRUE_JWT_SECRET: ${SUPABASE_JWT_SECRET}
      GOTRUE_MAILER_AUTOCONFIRM: "true"
      GOTRUE_LOG_LEVEL: ERROR
    networks:
      - app_net

  rest:
    image: postgrest/postgrest:v12.0.1
    restart: unless-stopped
    logging: *logging
    mem_limit: 256m
    cpus: "0.5"
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGRST_DB_URI: postgres://authenticator:${POSTGRES_PASSWORD}@db:5432/postgres
      PGRST_DB_SCHEMAS: public,storage,graphql_public
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: ${SUPABASE_JWT_SECRET}
      PGRST_DB_USE_LEGACY_GUCS: "false"
      PGRST_APP_SETTINGS_JWT_SECRET: ${SUPABASE_JWT_SECRET}
      PGRST_APP_SETTINGS_JWT_EXP: ${JWT_EXPIRY}
    command: postgrest
    networks:
      - app_net

  realtime:
    image: supabase/realtime:v2.27.5
    restart: unless-stopped
    logging: *logging
    mem_limit: 1g
    cpus: "0.5"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:4000/ > /dev/null"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    environment:
      PORT: 4000
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: supabase_replication_admin
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: postgres
      DB_AFTER_CONNECT_QUERY: SET search_path TO _realtime
      DB_ENC_KEY: ${REALTIME_DB_ENC_KEY}
      API_JWT_SECRET: ${SUPABASE_JWT_SECRET}
      FLY_ALLOC_ID: fly123
      FLY_APP_NAME: realtime
      SECRET_KEY_BASE: ${REALTIME_SECRET_KEY_BASE}
      ERL_AFLAGS: -proto_dist inet_tcp
      ENABLE_TAILSCALE: "false"
      DNS_NODES: "''"
    networks:
      - app_net

  storage:
    image: supabase/storage-api:v0.46.4
    restart: unless-stopped
    logging: *logging
    mem_limit: 256m
    cpus: "0.5"
    depends_on:
      db:
        condition: service_healthy
      rest:
        condition: service_started
    environment:
      ANON_KEY: ${ANON_KEY}
      SERVICE_KEY: ${SERVICE_ROLE_KEY}
      POSTGREST_URL: http://rest:3000
      PGRST_JWT_SECRET: ${SUPABASE_JWT_SECRET}
      DATABASE_URL: postgres://supabase_storage_admin:${POSTGRES_PASSWORD}@db:5432/postgres
      FILE_SIZE_LIMIT: 52428800
      STORAGE_BACKEND: file
      FILE_STORAGE_BACKEND_PATH: /var/lib/storage
      TENANT_ID: stub
      REGION: local
      GLOBAL_S3_BUCKET: stub
      ENABLE_IMAGE_TRANSFORMATION: "true"
      IMGPROXY_URL: http://imgproxy:5001
    volumes:
      - storage_data:/var/lib/storage
    networks:
      - app_net

  imgproxy:
    image: darthsim/imgproxy:v3.8.0
    restart: unless-stopped
    logging: *logging
    mem_limit: 256m
    cpus: "0.5"
    environment:
      IMGPROXY_BIND: 0.0.0.0:5001
      IMGPROXY_LOCAL_FILESYSTEM_ROOT: /
      IMGPROXY_USE_ETAG: "true"
      IMGPROXY_ENABLE_WEBP_DETECTION: "true"
    volumes:
      - storage_data:/var/lib/storage:ro
    networks:
      - app_net

  meta:
    image: supabase/postgres-meta:v0.80.0
    restart: unless-stopped
    logging: *logging
    mem_limit: 256m
    cpus: "0.5"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:8080/', (r) => process.exit(0)).on('error', () => process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    environment:
      PG_META_PORT: 8080
      PG_META_DB_HOST: db
      PG_META_DB_PORT: 5432
      PG_META_DB_NAME: postgres
      PG_META_DB_USER: supabase
      PG_META_DB_PASSWORD: ${POSTGRES_PASSWORD}
    networks:
      - app_net

  kong:
    image: kong:2.8.1
    restart: unless-stopped
    logging: *logging
    mem_limit: 1200m
    memswap_limit: 1200m   # sem swap — gateway não pode ser paginado para disco
    cpus: "1"
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    ports:
      - "127.0.0.1:54321:8000/tcp"
      - "127.0.0.1:54322:8443/tcp"
    volumes:
      - ./volumes/api/kong.yml:/var/lib/kong/kong.yml:ro
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /var/lib/kong/kong.yml
      KONG_MEM_CACHE_SIZE: 32m   # padrão 128m → 4×128m=512m alocados; 32m é suficiente em DBless com 18 serviços
      KONG_DNS_ORDER: LAST,A,CNAME
      ANON_KEY: ${ANON_KEY}
      SERVICE_ROLE_KEY: ${SERVICE_ROLE_KEY}
      KONG_PLUGINS: request-transformer,cors,key-auth,acl,basic-auth,rate-limiting
      KONG_NGINX_PROXY_PROXY_BUFFER_SIZE: 16k      # header da resposta upstream; padrão 4k
      KONG_NGINX_PROXY_PROXY_BUFFERS: 16 32k       # 512k/conn — cobre respostas freshservice/fiscal
      KONG_NGINX_PROXY_CLIENT_BODY_BUFFER_SIZE: 1m # cobre POST com XML NF-e; era 2m→256k (pequeno demais)
      KONG_NGINX_PROXY_CLIENT_MAX_BODY_SIZE: 10m
      # Sem esta variável, nginx usa auto = nproc do HOST (8 cores) → 8 workers × ~100MB = ~800MB
      # Com cpus:"1" limitado, 2 workers são suficientes e poupam ~600 MB de RAM
      KONG_NGINX_WORKER_PROCESSES: "2"
    networks:
      - app_net

  studio:
    image: supabase/studio:latest
    profiles: ["debug"]
    restart: "no"
    logging: *logging
    mem_limit: 512m
    cpus: "0.3"
    ports:
      - "127.0.0.1:54323:3000"
    depends_on:
      - kong
      - meta
    environment:
      STUDIO_PG_META_URL: http://meta:8080
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      DEFAULT_ORGANIZATION_NAME: Local
      DEFAULT_PROJECT_NAME: Jarvis
      SUPABASE_URL: http://kong:8000
      SUPABASE_PUBLIC_URL: ${API_EXTERNAL_URL}
      SUPABASE_ANON_KEY: ${ANON_KEY}
      SUPABASE_SERVICE_KEY: ${SERVICE_ROLE_KEY}
      AUTH_JWT_SECRET: ${SUPABASE_JWT_SECRET}
      NEXT_PUBLIC_ENABLE_LOGS: "false"
      HOSTNAME: "0.0.0.0"
    networks:
      - app_net

  # ────────────────────────────────────────────────────────────────────
  # APLICAÇÃO
  # ────────────────────────────────────────────────────────────────────

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL}
    restart: unless-stopped
    logging: *logging
    mem_limit: 256m
    cpus: "0.5"
    ports:
      - "443:443"
      - "80:80"
      - "8181:8181"
    volumes:
      # Certs Let's Encrypt gerenciados pelo serviço acme — substituem os self-signed do build
      - letsencrypt_certs:/etc/nginx/certs:ro
    depends_on:
      - core-service
    networks:
      - app_net

  acme:
    image: neilpang/acme.sh
    container_name: jarvis-acme
    restart: unless-stopped
    logging: *logging
    mem_limit: 64m
    memswap_limit: 64m
    cpus: "0.1"
    volumes:
      - jarvis_acme_data:/acme.sh
      - letsencrypt_certs:/certs
      # Socket para enviar SIGHUP ao nginx após renovação
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      CF_Token: ${CF_TOKEN}
      CF_Account_ID: ${CF_ACCOUNT_ID}
    command: daemon
    networks:
      - app_net

  # ────────────────────────────────────────────────────────────────────
  # MICROSSERVIÇOS
  # ────────────────────────────────────────────────────────────────────

  core-service:
    build:
      context: ./core-service
    restart: unless-stopped
    logging: *logging
    mem_limit: 512m
    cpus: "0.5"
    depends_on:
      db:
        condition: service_healthy
      kong:
        condition: service_started
    environment:
      SUPABASE_URL: http://kong:8000
      SUPABASE_KEY: ${SERVICE_ROLE_KEY}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRE_MINUTES: 480
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      FRONTEND_URL: ${FRONTEND_URL}
      MICROSOFT_REDIRECT_URI: ${MICROSOFT_REDIRECT_URI}
    networks:
      - app_net
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8001/health', timeout=8)\""]
      interval: 300s
      timeout: 12s
      retries: 3
      start_period: 10s

  monitoring-service:
    build:
      context: ./monitoring-service
    restart: unless-stopped
    logging: *logging
    mem_limit: 512m
    cpus: "0.5"
    depends_on:
      db:
        condition: service_healthy
      kong:
        condition: service_started
    environment:
      SUPABASE_URL: http://kong:8000
      SUPABASE_KEY: ${SERVICE_ROLE_KEY}
      JWT_SECRET: ${JWT_SECRET}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      FRONTEND_URL: ${FRONTEND_URL}
      MONITOR_AGENT_URL: http://monitor-agent:9100
      MONITOR_AGENT_TOKENS: ${MONITOR_AGENT_TOKENS:-}
      WHATSAPP_API_URL: ${WHATSAPP_API_URL:-}
      WHATSAPP_API_KEY: ${WHATSAPP_API_KEY:-}
      WHATSAPP_INSTANCE: ${WHATSAPP_INSTANCE:-}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
    networks:
      - app_net
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8002/health', timeout=8)\""]
      interval: 300s
      timeout: 12s
      retries: 3
      start_period: 15s

  freshservice-service:
    build:
      context: ./freshservice-service
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    mem_limit: 512m
    cpus: "0.5"
    depends_on:
      db:
        condition: service_healthy
      kong:
        condition: service_started
    environment:
      SUPABASE_URL: http://kong:8000
      SUPABASE_KEY: ${SERVICE_ROLE_KEY}
      JWT_SECRET: ${JWT_SECRET}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      FRONTEND_URL: ${FRONTEND_URL}
      FRESHSERVICE_API_KEY: ${FRESHSERVICE_API_KEY:-}
    networks:
      - app_net
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8003/health', timeout=8)\""]
      interval: 300s
      timeout: 12s
      retries: 3
      start_period: 15s

  moneypenny-service:
    build:
      context: ./moneypenny-service
    restart: unless-stopped
    logging: *logging
    mem_limit: 512m
    cpus: "0.5"
    depends_on:
      db:
        condition: service_healthy
      kong:
        condition: service_started
    environment:
      SUPABASE_URL: http://kong:8000
      SUPABASE_KEY: ${SERVICE_ROLE_KEY}
      JWT_SECRET: ${JWT_SECRET}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      FRONTEND_URL: ${FRONTEND_URL}
      MICROSOFT_CLIENT_ID: ${MICROSOFT_CLIENT_ID:-}
      MICROSOFT_TENANT_ID: ${MICROSOFT_TENANT_ID:-}
      MICROSOFT_CLIENT_SECRET: ${MICROSOFT_CLIENT_SECRET:-}
      MICROSOFT_REDIRECT_URI: ${MICROSOFT_REDIRECT_URI}
      WHATSAPP_API_URL: ${WHATSAPP_API_URL:-}
      WHATSAPP_API_KEY: ${WHATSAPP_API_KEY:-}
      WHATSAPP_INSTANCE: ${WHATSAPP_INSTANCE:-}
    networks:
      - app_net
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8004/health', timeout=8)\""]
      interval: 300s
      timeout: 12s
      retries: 3
      start_period: 15s

  ollama:
    image: ollama/ollama:latest
    container_name: jarvis-ollama
    # ⚠️  DESABILITADO — NÃO SUBIR SEM AUTORIZAÇÃO HUMANA EXPLÍCITA
    # Para ligar: docker compose --profile agents up -d ollama
    # Consome 2 GB RAM + 2 CPUs — recursos alocados ao sistema enquanto offline
    restart: "no"
    profiles: ["agents"]
    logging: *logging
    mem_limit: 2g
    memswap_limit: 2g
    mem_reservation: 1g
    cpus: "2"
    environment:
      # Limita paralelismo interno do runtime GGML
      OLLAMA_NUM_PARALLEL: "1"
      # Mantém o modelo carregado por 2 min após último uso (libera RAM mais rápido)
      OLLAMA_KEEP_ALIVE: "2m"
      # Máximo de tokens de contexto por requisição (reduz uso de RAM)
      OLLAMA_MAX_LOADED_MODELS: "1"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - app_net
    # GPU opcional: descomentar se servidor tiver NVIDIA
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - capabilities: [gpu]

  agents-service:
    build:
      context: ./agents-service
    # ⚠️  DESABILITADO — NÃO SUBIR SEM AUTORIZAÇÃO HUMANA EXPLÍCITA
    # Para ligar: docker compose --profile agents up -d agents-service
    restart: "no"
    profiles: ["agents"]
    logging: *logging
    mem_limit: 2g
    memswap_limit: 2g
    mem_reservation: 512m
    cpus: "2"
    depends_on:
      db:
        condition: service_healthy
      kong:
        condition: service_started
      ollama:
        condition: service_started
    environment:
      SUPABASE_URL: http://kong:8000
      SUPABASE_KEY: ${SERVICE_ROLE_KEY}
      SUPABASE_ANON_KEY: ${ANON_KEY}
      JWT_SECRET: ${JWT_SECRET}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      FRONTEND_URL: ${FRONTEND_URL}
      FRESHSERVICE_SERVICE_URL: http://freshservice-service:8003
      EXPENSES_SERVICE_URL: http://expenses-service:8006
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      GITHUB_REPO: ${GITHUB_REPO:-}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2:1b}
      # LLMs gratuitos — cascata: Cerebras → Groq → Together → OpenRouter → Mistral → HF → Ollama
      CEREBRAS_API_KEY: ${CEREBRAS_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      TOGETHER_API_KEY: ${TOGETHER_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      MISTRAL_API_KEY: ${MISTRAL_API_KEY:-}
      HUGGINGFACE_API_KEY: ${HUGGINGFACE_API_KEY:-}
      NVIDIA_API_KEY: ${NVIDIA_API_KEY:-}
      DEEPINFRA_API_KEY: ${DEEPINFRA_API_KEY:-}
      FIREWORKS_API_KEY: ${FIREWORKS_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      # PostgreSQL direto para db_dba_agent
      POSTGRES_DIRECT_URL: postgresql://postgres:${POSTGRES_PASSWORD}@db:5432/postgres
      # Pipelines LangGraph
      MONITORING_INTERVAL_MINUTES: ${MONITORING_INTERVAL_MINUTES:-15}
      SECURITY_INTERVAL_MINUTES: ${SECURITY_INTERVAL_MINUTES:-30}
      CICD_INTERVAL_MINUTES: ${CICD_INTERVAL_MINUTES:-5}
      DBA_INTERVAL_HOURS: ${DBA_INTERVAL_HOURS:-4}
      GOVERNANCE_CRON_HOUR: ${GOVERNANCE_CRON_HOUR:-6}
      EVOLUTION_CRON_HOUR: ${EVOLUTION_CRON_HOUR:-7}
      EVENT_CONSUMER_POLL_SECONDS: ${EVENT_CONSUMER_POLL_SECONDS:-60}
    volumes:
      - ./docs:/app/docs:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - app_net
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8005/health', timeout=8)\""]
      interval: 300s
      timeout: 12s
      retries: 3
      start_period: 15s

  expenses-service:
    build:
      context: ./expenses-service
    restart: unless-stopped
    init: true
    logging: *logging
    mem_limit: 512m
    cpus: "0.5"
    depends_on:
      db:
        condition: service_healthy
      kong:
        condition: service_started
    environment:
      SUPABASE_URL: http://kong:8000
      SUPABASE_KEY: ${SERVICE_ROLE_KEY}
      JWT_SECRET: ${JWT_SECRET}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      SQL_SERVER_HOST: ${SQL_SERVER_HOST:-}
      SQL_SERVER_PORT: ${SQL_SERVER_PORT:-1433}
      SQL_SERVER_DB: ${SQL_SERVER_DB:-}
      SQL_SERVER_USER: ${SQL_SERVER_USER:-}
      SQL_SERVER_PASSWORD: ${SQL_SERVER_PASSWORD:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      CRISIS_WEBHOOK_URL: ${CRISIS_WEBHOOK_URL:-}
      PAYFLY_V2_URL: ${PAYFLY_V2_URL:-}
      PAYFLY_V2_BEARER_TOKEN: ${PAYFLY_V2_BEARER_TOKEN:-}
      PAYFLY_V2_CLIENT_ID: ${PAYFLY_V2_CLIENT_ID:-}
      PAYFLY_V2_CLIENT_SECRET: ${PAYFLY_V2_CLIENT_SECRET:-}
    networks:
      - app_net
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:8006/health || exit 1"]
      interval: 300s
      timeout: 10s
      retries: 3
      start_period: 20s

  performance-service:
    build:
      context: ./performance-service
    restart: unless-stopped
    logging: *logging
    mem_limit: 1024m  # era 512m — 4 workers uvicorn exigem ~200 MB cada no pico
    cpus: "2.0"       # era 0.5 — 4 workers podem saturar até 4 cores; limitado a 2
    depends_on:
      db:
        condition: service_healthy
      kong:
        condition: service_started
    environment:
      SUPABASE_URL: http://kong:8000
      SUPABASE_KEY: ${SERVICE_ROLE_KEY}
      JWT_SECRET: ${JWT_SECRET}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      SQL_SERVER_HOST: ${SQL_SERVER_HOST:-}
      SQL_SERVER_PORT: ${SQL_SERVER_PORT:-1433}
      SQL_SERVER_DB: ${SQL_SERVER_BENNER_HR_DB:-}
      SQL_SERVER_USER: ${SQL_SERVER_USER:-}
      SQL_SERVER_PASSWORD: ${SQL_SERVER_PASSWORD:-}
