name: Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── 1. Gitleaks ──────────────────────────────────────────────────────────
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── 2. Testes frontend ───────────────────────────────────────────────────
  test-frontend:
    needs: security-scan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm install
      - run: npm audit --audit-level=high
      - run: npm run typecheck

  # ── 3. Deploy ────────────────────────────────────────────────────────────
  deploy:
    needs: [test-frontend]
    runs-on: self-hosted
    steps:
      - name: Deploy
        shell: powershell
        run: |
          $bash = "C:\Program Files\Git\bin\bash.exe"
          if (!(Test-Path $bash)) { $bash = (Get-Command bash -ErrorAction SilentlyContinue).Source }
          if (!$bash) { throw "bash não encontrado" }
          & $bash "E:/claudecode/claudecode/deploy.sh"

  # ── 4. Agente: Documentação (pós-deploy, advisory) ───────────────────────
  agent-docs-update:
    needs: deploy
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - name: Documentação do Deploy (NVIDIA NIM)
        env:
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
        run: |
          pip install openai --quiet
          CHANGED=$(git diff --name-only HEAD~1 HEAD)
          git diff HEAD~1 HEAD | head -c 60000 > /tmp/diff.txt

          echo "## Changelog do Deploy" >> $GITHUB_STEP_SUMMARY

          python3 - "$CHANGED" << 'PYEOF' >> $GITHUB_STEP_SUMMARY
          import os, sys
          from openai import OpenAI

          client = OpenAI(
              base_url="https://integrate.api.nvidia.com/v1",
              api_key=os.environ["NVIDIA_API_KEY"]
          )
          changed = sys.argv[1] if len(sys.argv) > 1 else ""
          with open("/tmp/diff.txt") as f:
              diff = f.read()
          prompt = (
              "Você é documentador técnico. Gere um resumo de CHANGELOG em português para este deploy.\n\n"
              f"Arquivos alterados:\n{changed}\n\n"
              "Formato markdown com seções:\n"
              "## O que Mudou\n## Impacto para Desenvolvedores\n"
              "## Configurações Necessárias (novas variáveis .env, migrações SQL)\n\n"
              f"Diff:\n{diff}"
          )
          r = client.chat.completions.create(
              model="meta/llama-3.3-70b-instruct",
              messages=[{"role": "user", "content": prompt}],
              temperature=0.2,
              max_tokens=2000,
          )
          print(r.choices[0].message.content)
          PYEOF
